name: Claude Auto-Issue

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  auto-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check for open issues
        id: check-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list --label backlog --state open --limit 1 --json number | jq length)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (autonomous issue agent)
        if: steps.check-issues.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            You are an autonomous developer agent. Work through these steps completely:

            ## Step 1 — Pick an issue
            Run: gh issue list --label backlog --state open --limit 1 --json number,title,body,labels
            If no issues are found, stop immediately.
            Note the issue number as ISSUE_NUMBER.

            ## Step 2 — Create a feature branch
            git checkout -b feature/issue-$ISSUE_NUMBER
            Label the issue as in-progress: gh issue edit $ISSUE_NUMBER --add-label "in-progress"

            ## Step 3 — Implement (TDD, following CLAUDE.md)
            - Read the issue body carefully; acceptance criteria map directly to tests
            - Write acceptance tests FIRST in the relevant crate
            - Implement the feature until `cargo test --workspace` is fully green
            - Key constraints from CLAUDE.md:
              * crates/core must have zero platform dependencies
              * All document mutations go through the CRDT layer (automerge-rs)
              * No feature gates on core functionality

            ## Step 4 — Self-review loop
            Review your own changes critically. Check for:
            - Correctness and test coverage
            - Security issues (no unsafe code without justification)
            - AGPL v3 compliance (no proprietary deps)
            - Architecture violations (platform code leaking into core)
            - Code quality (naming, no unnecessary comments, no dead code)
            Fix every issue you find, re-run `cargo test --workspace`, repeat until satisfied.

            ## Step 5 — Commit and open PR
            Commit with a clean message (imperative mood, max 72 chars, no co-author lines).
            Then:
            gh pr create \
              --title "<imperative title, max 72 chars>" \
              --body "$(cat <<'EOF'
            ## Summary
            <what was implemented and why>

            Closes #$ISSUE_NUMBER
            EOF
            )" \
              --label auto

            ## Step 6 — Wait for CI and merge
            gh pr checks --watch --fail-fast
            If all checks pass: gh pr merge --squash --delete-branch
            If checks fail: read the failure output, fix the issues, push the fix, wait again.
            Repeat until merged or you determine the issue is blocked.

            ## Step 7 — Remove in-progress label
            gh issue edit $ISSUE_NUMBER --remove-label "in-progress"
          claude_args: >
            --model claude-opus-4-7
            --max-turns 200

      - name: Notify if no issues found
        if: steps.check-issues.outputs.count == '0'
        run: echo "No open backlog issues found — skipping this run."
