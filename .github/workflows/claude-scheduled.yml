name: Claude Auto-Issue

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  # ─── Job 1: Pick an issue and write tests (red) ───────────────────────────
  write-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    outputs:
      found:  ${{ steps.pick-issue.outputs.found }}
      number: ${{ steps.pick-issue.outputs.number }}
      title:  ${{ steps.pick-issue.outputs.title }}
      branch: ${{ steps.pick-issue.outputs.branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Pick next open issue
        id: pick-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=$(gh issue list \
            --state open \
            --limit 100 \
            --json number,title,labels \
            | jq '
              def priority:
                .labels | map(.name) |
                if contains(["p1"]) then 1
                elif contains(["p2"]) then 2
                elif contains(["p3"]) then 3
                elif contains(["p4"]) then 4
                else 5 end;
              [.[] | select(.labels | map(.name) | contains(["in-progress"]) | not)]
              | sort_by([priority, .number])
              | first')

          NUMBER=$(echo "$ISSUE" | jq -r '.number // empty')
          TITLE=$(echo "$ISSUE"  | jq -r '.title  // empty')
          BRANCH="feature/issue-$NUMBER"

          if [ -z "$NUMBER" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"      >> "$GITHUB_OUTPUT"
            echo "number=$NUMBER"  >> "$GITHUB_OUTPUT"
            echo "title=$TITLE"    >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH"  >> "$GITHUB_OUTPUT"
            gh issue edit "$NUMBER" --add-label "in-progress"
          fi

      - name: Agent 1 — Write tests only (no implementation)
        if: steps.pick-issue.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a test engineer. Your ONLY job is to write tests for GitHub issue #${{ steps.pick-issue.outputs.number }}: "${{ steps.pick-issue.outputs.title }}"

            You must NOT implement any feature code. Only tests.

            ## Step 1 — Read the issue
            gh issue view ${{ steps.pick-issue.outputs.number }} --json title,body,comments
            Every acceptance criterion maps directly to one or more tests.

            ## Step 2 — Create the feature branch
            git checkout -b ${{ steps.pick-issue.outputs.branch }}

            ## Step 3 — Write tests at every relevant level
            Write tests that will FAIL because the feature doesn't exist yet (red phase of TDD).

            **Rust unit/integration tests** (in the relevant crate under `crates/` or `apps/`):
            - One `#[test]` per acceptance criterion
            - Test names must clearly describe what they verify
            - Use `todo!()` or `unimplemented!()` only if an interface doesn't exist yet

            **Playwright E2E tests** (in `tests/e2e/`) for any UI acceptance criteria:
            - File: `tests/e2e/<feature-name>.spec.ts`
            - One `test()` block per UI acceptance criterion
            - Tests must target the actual Svelte UI behaviour described in the issue
            - Tests should fail because the UI feature isn't built yet

            ## Step 4 — Verify tests are RED
            Run `cargo test --workspace 2>&1 | tail -20` — confirm tests exist and fail (not compile errors unrelated to the feature).
            If Playwright tests were written, note them in the commit message.

            ## Step 5 — Commit and push
            git add -A
            git commit -m "Add failing tests for issue #${{ steps.pick-issue.outputs.number }}"
            git push -u origin ${{ steps.pick-issue.outputs.branch }}

            STOP HERE. Do not implement anything.
          claude_args: >
            --model claude-haiku-4-5-20251001
            --max-turns 80

      - name: Clean up on failure
        if: failure() && steps.pick-issue.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ steps.pick-issue.outputs.number }} --remove-label "in-progress" || true

  # ─── Job 2: Implement until all tests are green ───────────────────────────
  implement:
    needs: write-tests
    if: needs.write-tests.outputs.found == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.write-tests.outputs.branch }}
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Agent 2 — Implement until tests are green
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            You are an implementer agent. Your job is to make the failing tests pass for GitHub issue #${{ needs.write-tests.outputs.number }}: "${{ needs.write-tests.outputs.title }}"

            The tests have already been written by a separate agent. You must NOT modify test files.

            ## Step 1 — Understand the tests
            Read the failing tests to understand exactly what needs to be built:
            - Rust tests: `cargo test --workspace 2>&1` — read every failure
            - Playwright tests if present: `cat tests/e2e/*.spec.ts`
            gh issue view ${{ needs.write-tests.outputs.number }} --json title,body

            ## Step 2 — Implement
            Write only the production code needed to make the tests pass.
            Key architecture constraints (from CLAUDE.md):
            - `crates/core` must have zero platform dependencies (no filesystem, no GPU, no UI)
            - All document mutations go through automerge-rs, never direct struct mutation
            - No `#[cfg(feature = "pro")]` on core functionality

            ## Step 3 — Green loop
            Run `cargo test --workspace` after each change.
            Fix compilation errors and test failures until ALL tests pass.
            Do NOT modify test files — if a test seems wrong, leave a comment and work around it.

            ## Step 4 — Self-review
            Review your implementation for:
            - Architecture violations (platform code in crates/core)
            - Security issues (unjustified unsafe, injection)
            - AGPL v3 compliance (no proprietary dependencies)
            - Dead code, unclear naming
            Fix findings, re-run tests.

            ## Step 5 — Commit and open PR
            git add -A
            git commit -m "<imperative summary, max 72 chars>"
            gh pr create \
              --title "<imperative title, max 72 chars>" \
              --body "## Summary
            <what was implemented>

            Closes #${{ needs.write-tests.outputs.number }}" \
              --label auto

            ## Step 6 — Wait for CI and merge
            gh pr checks --watch
            - All green: gh pr merge --squash --delete-branch
            - Failures: fix root cause, push, watch again

            ## Step 7 — Clean up
            gh issue edit ${{ needs.write-tests.outputs.number }} --remove-label "in-progress"
          claude_args: >
            --model claude-haiku-4-5-20251001
            --max-turns 200

      - name: Clean up on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ needs.write-tests.outputs.number }} --remove-label "in-progress" || true

      - name: No issues found
        if: needs.write-tests.outputs.found != 'true'
        run: echo "No open issues — nothing to do."
