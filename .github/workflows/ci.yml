name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  review:
    name: Claude Code Review
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch linked issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh pr view ${{ github.event.pull_request.number }} \
            --json body --jq '.body' \
            | grep -oE '(Closes|Fixes|Resolves) #[0-9]+' \
            | grep -oE '[0-9]+' | head -1)

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue view "$ISSUE_NUMBER" --json number,title,body \
              --jq '"## Linked Issue #\(.number) — \(.title)\n\n\(.body)"' \
              > /tmp/issue_body.txt 2>/dev/null || echo "(Could not load issue)" > /tmp/issue_body.txt
          else
            echo "(No linked issue — reviewing code only)" > /tmp/issue_body.txt
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review this pull request for the Publisher desktop publishing application.

            Start by reading the linked issue requirements:
              cat /tmp/issue_body.txt

            Then review the PR diff and check the following — in this order:

            ## 1. Acceptance criteria (most important)
            Go through every requirement and acceptance criterion listed in the issue.
            For each one, explicitly state ✅ met or ❌ missing, with a short justification.
            If there is no linked issue, skip this section.

            ## 2. Architecture
            - Does crates/core have any platform dependencies (filesystem, GPU, UI)?
            - Do all document mutations go through automerge-rs, never direct struct mutation?

            ## 3. TDD
            - Are tests present for the new behaviour?
            - Do the tests actually cover the acceptance criteria?

            ## 4. Security
            - Any unjustified unsafe code?
            - All new dependencies AGPL v3 compatible?

            ## 5. Code quality
            - Dead code, unnecessary comments, unclear naming?

            Post a single review comment with your findings.
            - If any acceptance criterion is ❌ missing: request changes.
            - If all criteria are met and no blocking issues: approve the PR.

  build-artifacts:
    name: Build (${{ matrix.name }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            artifact-name: Publisher-macos-arm64
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: Publisher-windows-x64
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-name: Publisher-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package publisher-cli

      - name: Package — macOS DMG
        if: runner.os == 'macOS'
        run: |
          BINARY="target/${{ matrix.target }}/release/publisher-cli"

          # .app bundle structure
          mkdir -p "Publisher.app/Contents/MacOS"
          cp "$BINARY" "Publisher.app/Contents/MacOS/Publisher"
          cat > "Publisher.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>Publisher</string>
            <key>CFBundleIdentifier</key><string>com.atcen.publisher</string>
            <key>CFBundleName</key><string>Publisher</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>LSArchitecturePriority</key><array><string>arm64</string></array>
          </dict>
          </plist>
          PLIST

          # DMG
          hdiutil create \
            -volname "Publisher" \
            -srcfolder "Publisher.app" \
            -ov -format UDZO \
            "${{ matrix.artifact-name }}.dmg"

      - name: Package — Windows ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target\${{ matrix.target }}\release\publisher-cli.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $src dist\Publisher.exe
          Compress-Archive -Path dist\Publisher.exe -DestinationPath "${{ matrix.artifact-name }}.zip"

      - name: Package — Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/publisher-cli" dist/publisher
          tar -czf "${{ matrix.artifact-name }}.tar.gz" -C dist publisher

      - name: Upload artifact — macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.dmg
          retention-days: 14

      - name: Upload artifact — Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.zip
          retention-days: 14

      - name: Upload artifact — Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.tar.gz
          retention-days: 14

  release-nightly:
    name: Nightly Release
    needs: build-artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Re-create the nightly tag on the current commit
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

          # Delete existing nightly release if present
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Create new release and upload all artifacts
          gh release create "$TAG" artifacts/**/* \
            --title "Nightly build ($DATE)" \
            --notes "Automated build from commit \`$COMMIT\` — not stable, for testing only." \
            --prerelease
