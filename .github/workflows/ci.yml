name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  APT_PACKAGES: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libgdk-pixbuf2.0-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libcairo-dev libpango-1.0-0 libpangocairo-1.0-0 libxcb-dri3-dev libxdamage-dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      - name: Install web dependencies
        run: npm ci --prefix apps/web
      - name: Check web frontend (TypeScript & Svelte)
        run: npm --prefix apps/web run check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix apps/web
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: apps/web
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: APT cache (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: ${{ env.APT_PACKAGES }}
          execute_install_scripts: true
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y ${{ env.APT_PACKAGES }}
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  check-wasm:
    name: Check WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown
      - name: Build publisher-core for WASM
        run: cargo build --target wasm32-unknown-unknown -p publisher-core --lib
      - name: Build publisher-wasm for WASM
        run: cargo build --target wasm32-unknown-unknown -p publisher-wasm --lib

  build-artifacts:
    name: Build (${{ matrix.name }})
    needs: [test, lint, check-wasm]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y ${{ env.APT_PACKAGES }}
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          npm install --prefix apps/web
          npm install --prefix apps/desktop

      - name: Set PKG_CONFIG_PATH (Linux only)
        if: runner.os == 'Linux'
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Build Desktop App Bundles
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target ${{ matrix.target }}"
          projectPath: "apps/desktop"

      - name: Build macOS App Bundle
        if: runner.os == 'macOS'
        run: npm --prefix apps/desktop run tauri -- build --target "${{ matrix.target }}" --bundles app

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          bundle_root="target/${{ matrix.target }}/release/bundle"
          app_path="$bundle_root/macos/Publisher.app"
          dmg_dir="$bundle_root/dmg"
          staging_dir="${RUNNER_TEMP}/publisher-dmg-staging"
          dmg_path="$dmg_dir/Publisher_${{ matrix.target }}.dmg"

          if [ ! -d "$app_path" ]; then
            echo "ERROR: expected macOS app bundle at $app_path"
            find "$bundle_root" -maxdepth 4 -print 2>/dev/null || true
            exit 1
          fi

          rm -rf "$staging_dir"
          mkdir -p "$staging_dir" "$dmg_dir"
          ditto "$app_path" "$staging_dir/Publisher.app"
          ln -s /Applications "$staging_dir/Applications"
          rm -f "$dmg_path"

          hdiutil create \
            -volname "Publisher" \
            -srcfolder "$staging_dir" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "$dmg_path"

      - name: Validate macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          dmg_dir="target/${{ matrix.target }}/release/bundle/dmg"
          validated_dir="target/${{ matrix.target }}/release/bundle/validated/dmg"
          mount_point="$(mktemp -d "${RUNNER_TEMP}/publisher-dmg.XXXXXX")"

          cleanup() {
            hdiutil detach "$mount_point" -quiet 2>/dev/null || true
            rmdir "$mount_point" 2>/dev/null || true
          }
          trap cleanup EXIT

          dmg_files=()
          while IFS= read -r dmg_file; do
            dmg_files+=("$dmg_file")
          done < <(find "$dmg_dir" -maxdepth 1 -type f -name "*.dmg" | sort)

          if [ "${#dmg_files[@]}" -ne 1 ]; then
            echo "ERROR: expected exactly one DMG in $dmg_dir, found ${#dmg_files[@]}"
            printf '  %s\n' "${dmg_files[@]}"
            exit 1
          fi

          dmg="${dmg_files[0]}"
          hdiutil verify "$dmg"
          hdiutil attach -readonly -nobrowse -mountpoint "$mount_point" "$dmg"

          app_path="$mount_point/Publisher.app"
          if [ ! -d "$app_path" ]; then
            echo "ERROR: mounted DMG does not contain Publisher.app"
            find "$mount_point" -maxdepth 3 -print
            exit 1
          fi

          bundle_executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Contents/Info.plist")"
          executable_path="$app_path/Contents/MacOS/$bundle_executable"
          if [ ! -x "$executable_path" ]; then
            echo "ERROR: Publisher.app is missing a launchable executable at $executable_path"
            find "$app_path/Contents/MacOS" -maxdepth 1 -print 2>/dev/null || true
            exit 1
          fi

          spctl_output="$(spctl --assess --type execute --verbose=4 "$app_path" 2>&1)" || spctl_status=$?
          spctl_status="${spctl_status:-0}"
          echo "$spctl_output"
          if [ "$spctl_status" -ne 0 ] && echo "$spctl_output" | grep -Eiq 'corrupt|corrupted|damaged|malformed'; then
            echo "ERROR: Gatekeeper reported the app as corrupted or damaged"
            exit 1
          fi

          open -n "$app_path"
          sleep 5
          osascript -e 'quit app "Publisher"' || true

          mkdir -p "$validated_dir"
          cp "$dmg" "$validated_dir/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb
            target/${{ matrix.target }}/release/bundle/rpm
            target/${{ matrix.target }}/release/bundle/appimage
            target/${{ matrix.target }}/release/bundle/nsis
            target/${{ matrix.target }}/release/bundle/validated/dmg
          if-no-files-found: warn
          retention-days: 1

  release-nightly:
    name: Publish Nightly Release
    needs: build-artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: artifacts-*

      - name: Create/Update Nightly Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Delete existing nightly release and tag to start fresh
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create fresh nightly tag pointing to current commit
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

          # Create new nightly release
          gh release create "$TAG" \
            --title "Nightly build ($DATE)" \
            --notes "Automated build from commit \`$COMMIT\`. Built with Tauri." \
            --prerelease \
            --latest=false

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"

          echo "=== Listing all files in release-files ==="
          ls -lR release-files/ || echo "release-files directory not found"
          echo ""

          echo "=== Finding installer files ==="
          installer_files=()
          while IFS= read -r installer_file; do
            installer_files+=("$installer_file")
          done < <(find release-files -type f \( -path "*/validated/dmg/*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \))

          echo "Found ${#installer_files[@]} files:"
          printf '  %s\n' "${installer_files[@]}"
          echo ""

          if [ ${#installer_files[@]} -eq 0 ]; then
            echo "ERROR: No installer files found!"
            exit 1
          fi

          echo "=== Uploading to release ==="
          for file in "${installer_files[@]}"; do
            echo "Uploading: $file"
            if gh release upload "$TAG" "$file" --clobber 2>&1; then
              echo "✓ Upload successful"
            else
              echo "✗ Upload failed for $file"
              exit 1
            fi
          done
