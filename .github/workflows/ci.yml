name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  review:
    name: Claude Code Review
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review this pull request for the Publisher desktop publishing application.

            Review the PR diff and check the following:

            ## 1. Architecture
            - Does crates/core have any platform dependencies (filesystem, GPU, UI)?
            - Do all document mutations go through automerge-rs, never direct struct mutation?

            ## 2. Code quality
            - Are there obvious bugs or issues?
            - Dead code, unnecessary comments, unclear naming?
            - Does the change accomplish what it claims?

            ## 3. Security
            - Any unjustified unsafe code?
            - All new dependencies AGPL v3 compatible?

            Post a single review comment with your findings.
            - If there are blocking issues: request changes.
            - If the code looks good: approve the PR.

  build-artifacts:
    name: Build (${{ matrix.name }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Svelte dependencies
        run: npm install --prefix apps/web

      - name: Build Desktop App Bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target ${{ matrix.target }}"
          projectPath: "apps/desktop"

  release-nightly:
    name: Publish Nightly Release
    needs: build-artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create/Update Nightly Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Re-tag the current commit as nightly
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

          # Delete existing draft release if it exists to avoid conflicts
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

          # Create new nightly release
          gh release create "$TAG" \
            --title "Nightly build ($DATE)" \
            --notes "Automated build from commit \`$COMMIT\`. Built with Tauri." \
            --prerelease \
            --latest=false
