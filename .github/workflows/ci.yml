name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  APT_PACKAGES: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libgdk-pixbuf2.0-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libcairo-dev libpango-1.0-0 libpangocairo-1.0-0 libxcb-dri3-dev libxdamage-dev

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: APT cache (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@2600aa0e7f15d4f4e6dfe68ecb84e55c86bb8a88
        with:
          packages: ${{ env.APT_PACKAGES }}
          version: 1.0
          execute_install_scripts: true
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y ${{ env.APT_PACKAGES }}
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: APT cache (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@2600aa0e7f15d4f4e6dfe68ecb84e55c86bb8a88
        with:
          packages: ${{ env.APT_PACKAGES }}
          version: 1.0
          execute_install_scripts: true
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y ${{ env.APT_PACKAGES }}
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  build-artifacts:
    name: Build (${{ matrix.name }})
    needs: [test, lint]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: APT cache (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@2600aa0e7f15d4f4e6dfe68ecb84e55c86bb8a88
        with:
          packages: ${{ env.APT_PACKAGES }}
          version: 1.0
          execute_install_scripts: true
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y ${{ env.APT_PACKAGES }}
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          npm install --prefix apps/web
          npm install --prefix apps/desktop

      - name: Set PKG_CONFIG_PATH (Linux only)
        if: runner.os == 'Linux'
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Build Desktop App Bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--target ${{ matrix.target }}"
          projectPath: "apps/desktop"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle
          if-no-files-found: warn
          retention-days: 1

  release-nightly:
    name: Publish Nightly Release
    needs: build-artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: artifacts-*

      - name: Create/Update Nightly Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Delete existing nightly release and tag to start fresh
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create fresh nightly tag pointing to current commit
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

          # Create new nightly release
          gh release create "$TAG" \
            --title "Nightly build ($DATE)" \
            --notes "Automated build from commit \`$COMMIT\`. Built with Tauri." \
            --prerelease \
            --latest=false

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"

          echo "=== Listing all files in release-files ==="
          ls -lR release-files/ || echo "release-files directory not found"
          echo ""

          echo "=== Finding installer files ==="
          mapfile -t installer_files < <(find release-files -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \))
          echo "Found ${#installer_files[@]} files:"
          printf '  %s\n' "${installer_files[@]}"
          echo ""

          if [ ${#installer_files[@]} -eq 0 ]; then
            echo "ERROR: No installer files found!"
            exit 1
          fi

          echo "=== Uploading to release ==="
          for file in "${installer_files[@]}"; do
            echo "Uploading: $file"
            if gh release upload "$TAG" "$file" --clobber 2>&1; then
              echo "✓ Upload successful"
            else
              echo "✗ Upload failed for $file"
              exit 1
            fi
          done
