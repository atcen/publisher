id: com.publisher.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: publisher
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
modules:
  - name: publisher
    buildsystem: simple
    build-commands:
      - npm install --prefix apps/web
      - cargo build --release -p publisher-desktop
      - install -Dm755 target/release/publisher-desktop /app/bin/publisher
    sources:
      - type: git
        url: https://github.com/atcen/publisher.git
        branch: main
